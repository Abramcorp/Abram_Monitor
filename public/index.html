<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Мониторинг заявок</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Deal Monitor</p>
          <h1>Мониторинг состояния заявок</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="refreshButton" title="Обновить данные" type="button">↻</button>
          <button class="primary-button" id="newManagerButton" type="button">+ Аналитик</button>
          <button class="primary-button" id="newClientButton" type="button">+ Клиент</button>
          <button class="ghost-button" id="newKnowledgeButton" type="button">+ Запись БЗ</button>
        </div>
      </header>

      <nav class="tabs" id="viewTabs" aria-label="Разделы мониторинга">
      </nav>

      <main id="app" aria-live="polite">
        <div class="loading">Загрузка данных...</div>
      </main>
    </div>

    <dialog class="deal-dialog" id="dealDialog">
      <form method="dialog" class="deal-form" id="dealForm">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Заявка</p>
            <h2>Новая заявка</h2>
          </div>
          <button class="icon-button" value="cancel" title="Закрыть" type="submit" formnovalidate>×</button>
        </div>

        <label>
          Аналитик
          <select name="manager" required></select>
        </label>
        <input name="managerLocked" type="hidden">

        <label>
          Клиент
          <input name="client" required list="clientOptions" autocomplete="off">
          <datalist id="clientOptions"></datalist>
        </label>

        <label>
          Программа
          <select name="knowledgeProgramId" required></select>
        </label>
        <div class="application-program-preview" id="applicationProgramPreview" aria-live="polite"></div>
        <input name="bank" type="hidden">
        <input name="program" type="hidden">
        <input name="programType" type="hidden">
        <input name="programAmountRange" type="hidden">
        <input name="programTermRange" type="hidden">

        <input name="stage" type="hidden" value="planned">

        <div class="form-grid">
          <label>
            Сумма заявки
            <input name="amountRequested" inputmode="decimal" placeholder="0">
          </label>
          <label>
            Одобрено
            <input name="amountApproved" inputmode="decimal" placeholder="0">
          </label>
        </div>

        <label>
          Комментарий
          <textarea name="comment" rows="4"></textarea>
        </label>

        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="submit" formnovalidate>Отмена</button>
          <button class="primary-button" id="saveDealButton" value="default" type="submit">Сохранить заявку</button>
        </div>
      </form>
    </dialog>

    <dialog class="deal-dialog" id="dealActionDialog">
      <form method="dialog" class="deal-form" id="dealActionForm">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Хронология</p>
            <h2>Новое действие</h2>
          </div>
          <button class="icon-button" value="cancel" title="Закрыть" type="submit" formnovalidate>×</button>
        </div>

        <input name="dealId" type="hidden">

        <label>
          Дата и время
          <input name="actionAt" type="datetime-local" required>
        </label>

        <label>
          Действие / комментарий
          <textarea name="action" rows="4" required></textarea>
        </label>

        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="submit" formnovalidate>Отмена</button>
          <button class="primary-button" value="default" type="submit">Добавить</button>
        </div>
      </form>
    </dialog>

    <dialog class="deal-dialog" id="clientDialog">
      <form method="dialog" class="deal-form" id="clientForm">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Клиент</p>
            <h2>Новый клиент</h2>
          </div>
          <button class="icon-button" value="cancel" title="Закрыть" type="submit" formnovalidate>×</button>
        </div>

        <label>
          Аналитик
          <select name="manager" required></select>
        </label>

        <label>
          Наименование
          <input name="name" required autocomplete="off">
        </label>

        <div class="form-grid">
          <label>
            Ссылка на CRM
            <input name="crmUrl" type="url" placeholder="https://..." autocomplete="off">
          </label>
          <label>
            Ссылка на диск
            <input name="driveUrl" type="url" placeholder="https://..." autocomplete="off">
          </label>
          <label>
            Ссылка на инструкцию
            <input name="instructionUrl" type="url" placeholder="https://..." autocomplete="off">
          </label>
        </div>

        <label>
          Комментарий
          <textarea name="comment" rows="3"></textarea>
        </label>

        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="submit" formnovalidate>Отмена</button>
          <button class="primary-button" value="default" type="submit">Сохранить</button>
        </div>
      </form>
    </dialog>

    <dialog class="deal-dialog" id="managerDialog">
      <form method="dialog" class="deal-form" id="managerForm">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Учетная карточка</p>
            <h2>Новый аналитик</h2>
          </div>
          <button class="icon-button" value="cancel" title="Закрыть" type="submit" formnovalidate>×</button>
        </div>

        <label>
          Имя
          <input name="name" required autocomplete="off">
        </label>

        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="submit" formnovalidate>Отмена</button>
          <button class="primary-button" value="default" type="submit">Сохранить</button>
        </div>
      </form>
    </dialog>

    <dialog class="deal-dialog" id="knowledgeDialog">
      <form method="dialog" class="deal-form" id="knowledgeForm">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">База знаний</p>
            <h2 id="knowledgeDialogTitle">Новая запись</h2>
          </div>
          <button class="icon-button" value="cancel" title="Закрыть" type="submit" formnovalidate>×</button>
        </div>

        <input name="programId" type="hidden">

        <label>
          Банк
          <input name="bank" required list="bankOptions" autocomplete="off">
          <datalist id="bankOptions"></datalist>
        </label>

        <div class="form-grid">
          <label>
            Телефон банка
            <input name="bankPhone" type="tel" autocomplete="off" placeholder="+7...">
          </label>
          <label>
            Программа
            <input name="program" required autocomplete="off" placeholder="Оборотный">
          </label>
          <label>
            Ссылка
            <input name="programUrl" type="url" autocomplete="off" placeholder="https://...">
          </label>
          <label>
            Сумма
            <input name="amountRange" autocomplete="off" placeholder="от 5 до 50 млн">
          </label>
          <label>
            Срок
            <input name="termRange" autocomplete="off" placeholder="до 36 мес.">
          </label>
          <label>
            Срок рассмотрения (заявленный)
            <input name="reviewTermDeclared" autocomplete="off" placeholder="до 5 рабочих дней">
          </label>
          <label>
            Тип программы
            <select name="programType" required>
              <option value="Экспресс">Экспресс</option>
              <option value="Стандарт">Стандарт</option>
              <option value="Физическое лицо">Физическое лицо</option>
              <option value="Добивка">Добивка</option>
            </select>
          </label>
        </div>

        <div class="form-grid">
          <label>
            Регион ведения бизнеса
            <textarea name="businessRegion" rows="3"></textarea>
          </label>
          <label>
            Возраст ИП
            <textarea name="ipAge" rows="3"></textarea>
          </label>
          <label>
            Выручка
            <textarea name="revenue" rows="3"></textarea>
          </label>
          <label>
            Запросы и документы
            <textarea name="documentation" rows="3"></textarea>
          </label>
          <label>
            ОКВЭД
            <textarea name="okved" rows="3"></textarea>
          </label>
          <label>
            Наличие счета
            <textarea name="accountPresence" rows="3"></textarea>
          </label>
        </div>

        <label>
          Заметки
          <textarea name="notes" rows="3"></textarea>
        </label>

        <label>
          История изменений
          <textarea name="changeHistory" rows="3" placeholder="Что изменилось, когда и кем"></textarea>
        </label>

        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="submit" formnovalidate>Отмена</button>
          <button class="primary-button" value="default" type="submit">Сохранить</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js" defer></script>
  </body>
</html>
