<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Мониторинг сделок</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Deal Monitor</p>
          <h1>Мониторинг состояния сделок</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="refreshButton" title="Обновить данные" type="button">↻</button>
          <button class="primary-button" id="newClientButton" type="button">+ Клиент</button>
          <button class="primary-button" id="newDealButton" type="button">+ Новая сделка</button>
          <button class="ghost-button" id="newKnowledgeButton" type="button">+ Запись БЗ</button>
        </div>
      </header>

      <nav class="tabs mode-tabs" aria-label="Режимы доступа">
        <button class="tab is-active" data-mode="analyst" type="button">Аналитики</button>
        <button class="tab" data-mode="board" type="button">Правление</button>
      </nav>

      <nav class="tabs" id="viewTabs" aria-label="Разделы мониторинга">
      </nav>

      <main id="app" aria-live="polite">
        <div class="loading">Загрузка данных...</div>
      </main>
    </div>

    <dialog class="deal-dialog" id="dealDialog">
      <form method="dialog" class="deal-form" id="dealForm">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Сделка</p>
            <h2>Новая заявка</h2>
          </div>
          <button class="icon-button" value="cancel" title="Закрыть" type="submit" formnovalidate>×</button>
        </div>

        <label>
          Менеджер
          <input name="manager" required list="managerOptions" autocomplete="off">
          <datalist id="managerOptions"></datalist>
        </label>

        <label>
          Клиент
          <input name="client" required list="clientOptions" autocomplete="off">
          <datalist id="clientOptions"></datalist>
        </label>

        <label>
          Банк
          <select name="bank" required></select>
        </label>

        <label>
          Этап
          <select name="stage" required></select>
        </label>

        <div class="form-grid">
          <label>
            Сумма заявки
            <input name="amountRequested" inputmode="decimal" placeholder="0">
          </label>
          <label>
            Одобрено
            <input name="amountApproved" inputmode="decimal" placeholder="0">
          </label>
        </div>

        <div class="form-grid">
          <label>
            Бюро
            <input name="bureau" autocomplete="off">
          </label>
          <label>
            Следующее действие
            <input name="nextActionAt" type="datetime-local">
          </label>
        </div>

        <label>
          Комментарий
          <textarea name="comment" rows="4"></textarea>
        </label>

        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="submit" formnovalidate>Отмена</button>
          <button class="primary-button" id="saveDealButton" value="default" type="submit">Сохранить</button>
        </div>
      </form>
    </dialog>

    <dialog class="deal-dialog" id="clientDialog">
      <form method="dialog" class="deal-form" id="clientForm">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Клиент</p>
            <h2>Новый клиент</h2>
          </div>
          <button class="icon-button" value="cancel" title="Закрыть" type="submit" formnovalidate>×</button>
        </div>

        <label>
          Менеджер
          <input name="manager" required list="managerOptions" autocomplete="off">
        </label>

        <label>
          Наименование
          <input name="name" required autocomplete="off">
        </label>

        <div class="form-grid">
          <label>
            Контакт
            <input name="contact" autocomplete="off">
          </label>
          <label>
            Телефон
            <input name="phone" autocomplete="off">
          </label>
        </div>

        <label>
          Комментарий
          <textarea name="comment" rows="3"></textarea>
        </label>

        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="submit" formnovalidate>Отмена</button>
          <button class="primary-button" value="default" type="submit">Сохранить</button>
        </div>
      </form>
    </dialog>

    <dialog class="deal-dialog" id="knowledgeDialog">
      <form method="dialog" class="deal-form" id="knowledgeForm">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">База знаний</p>
            <h2>Новая запись</h2>
          </div>
          <button class="icon-button" value="cancel" title="Закрыть" type="submit" formnovalidate>×</button>
        </div>

        <label>
          Банк
          <input name="bank" required list="bankOptions" autocomplete="off">
          <datalist id="bankOptions"></datalist>
        </label>

        <label>
          Программа
          <input name="program" required autocomplete="off">
        </label>

        <div class="form-grid">
          <label>
            Регион ведения бизнеса
            <textarea name="businessRegion" rows="3"></textarea>
          </label>
          <label>
            Возраст ИП
            <textarea name="ipAge" rows="3"></textarea>
          </label>
          <label>
            Выручка
            <textarea name="revenue" rows="3"></textarea>
          </label>
          <label>
            Документация
            <textarea name="documentation" rows="3"></textarea>
          </label>
          <label>
            ОКВЭД
            <textarea name="okved" rows="3"></textarea>
          </label>
          <label>
            Наличие счета
            <textarea name="accountPresence" rows="3"></textarea>
          </label>
        </div>

        <label>
          Заметки
          <textarea name="notes" rows="3"></textarea>
        </label>

        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="submit" formnovalidate>Отмена</button>
          <button class="primary-button" value="default" type="submit">Сохранить</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
